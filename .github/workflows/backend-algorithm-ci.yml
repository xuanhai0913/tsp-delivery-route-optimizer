name: Backend Algorithm CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "data/**"
      - ".github/workflows/backend-algorithm-ci.yml"
      - ".github/scripts/**"
      - "render.yaml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "data/**"
      - ".github/workflows/backend-algorithm-ci.yml"
      - ".github/scripts/**"
      - "render.yaml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: backend-algorithm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-algorithm-tests:
    name: Typecheck and test backend algorithms
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck backend
        run: npm run typecheck

      - name: Run algorithm tests
        run: npm run test

      - name: Build backend
        run: npm run build

  backend-ai-review:
    name: AI review backend diff
    runs-on: ubuntu-latest
    needs: backend-algorithm-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate backend diff
        run: |
          mkdir -p .github

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git diff-tree --no-commit-id --unified=80 -r "${{ github.sha }}" -- \
              backend data .github/workflows/backend-algorithm-ci.yml .github/scripts render.yaml > .github/backend.diff
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --unified=80 --no-ext-diff "origin/${{ github.base_ref }}...HEAD" -- \
              backend data .github/workflows/backend-algorithm-ci.yml .github/scripts render.yaml > .github/backend.diff
          else
            BEFORE="${{ github.event.before }}"
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              git diff --unified=80 --no-ext-diff "$BEFORE" "${{ github.sha }}" -- \
                backend data .github/workflows/backend-algorithm-ci.yml .github/scripts render.yaml > .github/backend.diff
            else
              git diff-tree --no-commit-id --unified=80 -r "${{ github.sha }}" -- \
                backend data .github/workflows/backend-algorithm-ci.yml .github/scripts render.yaml > .github/backend.diff
            fi
          fi

      - name: Run Gemini backend AI review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          REVIEW_DIFF_PATH: .github/backend.diff
          AI_REVIEW_RESULT_PATH: .github/ai-review-result.json
          AI_REVIEW_SUMMARY_PATH: .github/ai-review-summary.md
        run: |
          set +e
          node .github/scripts/backend-ai-review.mjs
          review_exit_code=$?
          echo "AI_REVIEW_EXIT_CODE=$review_exit_code" >> "$GITHUB_ENV"
          exit 0

      - name: Add AI review summary
        if: always()
        run: cat .github/ai-review-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment AI review on pull request
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file .github/ai-review-summary.md

      - name: Notify Discord
        if: always()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MENTION: ${{ secrets.DISCORD_MENTION }}
          AI_REVIEW_EXIT_CODE: ${{ env.AI_REVIEW_EXIT_CODE }}
          AI_REVIEW_SUMMARY_PATH: .github/ai-review-summary.md
          AI_REVIEW_RESULT_PATH: .github/ai-review-result.json
        run: node .github/scripts/notify-discord.mjs

      - name: Enforce AI review gate
        run: exit "${AI_REVIEW_EXIT_CODE:-1}"
